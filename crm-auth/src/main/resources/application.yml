spring:
  application:
    name: crm-auth
  config:
    import:
      - optional:classpath:application-common.yml
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
        namespace: dev
        username: nacos  # 默认用户名
        password: 123456  # 默认密码
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        namespace: dev
        file-extension: yaml
        username: nacos  # 默认用户名
        password: 123456  # 默认密码
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/crm_auth?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 12345678
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8087

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置（使用 Redis 分布式会话）
sa-token:
  is-log: true
  # Redis 集成
  alone-redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    timeout: 3000

# 通知推送模式 (sse)
notification:
  mode: sse
